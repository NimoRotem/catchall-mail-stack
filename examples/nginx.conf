# Nginx site for example.com that proxies /mail/ to the FastAPI mail app.
# Adjust upstream port to match MAIL_PORT in supervisor.

server {
    listen 80;
    server_name example.com www.example.com;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name example.com www.example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    location = /mail { return 301 $scheme://$host/mail/; }

    location /mail/ {
        proxy_pass http://127.0.0.1:8517/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 15M;
    }

    # Optional: expose the public contact-form endpoint on the apex
    location = /api/contact {
        proxy_pass http://127.0.0.1:8517/api/contact;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Your apex site goes here (root, index, etc.)
}
